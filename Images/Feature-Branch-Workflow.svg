<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .section-title { font-size: 15px; font-weight: bold; fill: #fff; }
      .label { font-size: 13px; fill: #333; }
      .label-bold { font-size: 13px; fill: #333; font-weight: bold; }
      .small { font-size: 11px; fill: #666; }
      .white-text { font-size: 12px; fill: #fff; font-weight: bold; }
      .callout-box { font-size: 10px; fill: #fff; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078D4" />
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828" />
    </marker>
    <clipPath id="clip-all"><rect x="0" y="0" width="1200" height="820"/></clipPath>
  </defs>

  <g clip-path="url(#clip-all)">
  <rect x="0" y="0" width="1200" height="820" rx="12" fill="#f9fafb" stroke="#e0e0e0" stroke-width="1"/>

  <!-- AZURE DEVOPS SECTION -->
  <rect x="30" y="20" width="1140" height="475" rx="10" fill="#EBF3FB" stroke="#0078D4" stroke-width="2"/>
  <rect x="30" y="20" width="1140" height="36" rx="10" fill="#0078D4"/>
  <rect x="30" y="46" width="1140" height="10" fill="#0078D4"/>
  <text x="600" y="44" text-anchor="middle" class="section-title">Azure DevOps Repository</text>

  <!-- Main branch line -->
  <line x1="100" y1="130" x2="1120" y2="130" stroke="#0078D4" stroke-width="4"/>
  <text x="75" y="135" text-anchor="end" class="label-bold" fill="#0078D4">main</text>

  <!-- Commits on main -->
  <circle cx="140" cy="130" r="10" fill="#0078D4" stroke="#fff" stroke-width="2"/>
  <text x="140" y="108" text-anchor="middle" class="small">C1</text>
  <circle cx="620" cy="130" r="12" fill="#0078D4" stroke="#fff" stroke-width="3"/>
  <text x="620" y="105" text-anchor="middle" class="small" style="font-weight:bold">C2 (PR #1 merged)</text>
  <circle cx="1060" cy="130" r="12" fill="#0078D4" stroke="#fff" stroke-width="3"/>
  <text x="1060" y="105" text-anchor="middle" class="small" style="font-weight:bold">C3 (PR #2 merged)</text>

  <!-- FEATURE BRANCH 1 (Orange) -->
  <line x1="140" y1="130" x2="175" y2="220" stroke="#E8590C" stroke-width="3" stroke-dasharray="6,3"/>
  <line x1="175" y1="220" x2="560" y2="220" stroke="#E8590C" stroke-width="3"/>
  <circle cx="230" cy="220" r="7" fill="#E8590C" stroke="#fff" stroke-width="2"/>
  <circle cx="320" cy="220" r="7" fill="#E8590C" stroke="#fff" stroke-width="2"/>
  <circle cx="410" cy="220" r="7" fill="#E8590C" stroke="#fff" stroke-width="2"/>
  <circle cx="500" cy="220" r="7" fill="#E8590C" stroke="#fff" stroke-width="2"/>
  <line x1="560" y1="220" x2="620" y2="130" stroke="#E8590C" stroke-width="3" stroke-dasharray="6,3"/>

  <text x="125" y="220" text-anchor="end" class="label" fill="#E8590C" style="font-size:11px">feature/</text>
  <text x="125" y="235" text-anchor="end" class="label" fill="#E8590C" style="font-size:11px">add-blood-</text>
  <text x="125" y="250" text-anchor="end" class="label" fill="#E8590C" style="font-size:11px">type-filter</text>

  <rect x="530" y="158" width="90" height="24" rx="5" fill="#E8590C"/>
  <text x="575" y="175" text-anchor="middle" class="callout-box" style="font-size:11px">PR #1 ✓ Merge</text>

  <rect x="210" y="248" width="180" height="20" rx="4" fill="#fff" stroke="#E8590C" stroke-width="1"/>
  <text x="300" y="262" text-anchor="middle" class="small" style="fill:#E8590C; font-size:10px">① Develops &amp; completes first</text>

  <!-- FEATURE BRANCH 2 (Purple) -->
  <line x1="140" y1="130" x2="175" y2="340" stroke="#7B2D8E" stroke-width="3" stroke-dasharray="6,3"/>
  <line x1="175" y1="340" x2="1000" y2="340" stroke="#7B2D8E" stroke-width="3"/>
  <circle cx="240" cy="340" r="7" fill="#7B2D8E" stroke="#fff" stroke-width="2"/>
  <circle cx="340" cy="340" r="7" fill="#7B2D8E" stroke="#fff" stroke-width="2"/>
  <circle cx="440" cy="340" r="7" fill="#7B2D8E" stroke="#fff" stroke-width="2"/>
  <circle cx="560" cy="340" r="7" fill="#7B2D8E" stroke="#fff" stroke-width="2"/>

  <text x="125" y="340" text-anchor="end" class="label" fill="#7B2D8E" style="font-size:11px">feature/</text>
  <text x="125" y="355" text-anchor="end" class="label" fill="#7B2D8E" style="font-size:11px">update-</text>
  <text x="125" y="370" text-anchor="end" class="label" fill="#7B2D8E" style="font-size:11px">utilization-</text>
  <text x="125" y="385" text-anchor="end" class="label" fill="#7B2D8E" style="font-size:11px">report</text>

  <!-- Merge main INTO feature/2 (red arrow) -->
  <line x1="620" y1="130" x2="710" y2="340" stroke="#c62828" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow-red)"/>
  <circle cx="710" cy="340" r="10" fill="#c62828" stroke="#fff" stroke-width="3"/>

  <!-- Red callout box -->
  <rect x="638" y="250" width="240" height="58" rx="8" fill="#c62828"/>
  <text x="758" y="270" text-anchor="middle" class="callout-box" style="font-size:11px; font-weight:bold;">⚠ REQUIRED: Merge main into</text>
  <text x="758" y="286" text-anchor="middle" class="callout-box" style="font-size:11px; font-weight:bold;">feature branch before opening PR</text>
  <text x="758" y="300" text-anchor="middle" class="callout-box" style="font-size:10px;">(git merge main  or  git rebase main)</text>

  <circle cx="810" cy="340" r="7" fill="#7B2D8E" stroke="#fff" stroke-width="2"/>
  <circle cx="900" cy="340" r="7" fill="#7B2D8E" stroke="#fff" stroke-width="2"/>

  <line x1="1000" y1="340" x2="1060" y2="130" stroke="#7B2D8E" stroke-width="3" stroke-dasharray="6,3"/>
  <rect x="970" y="200" width="90" height="24" rx="5" fill="#7B2D8E"/>
  <text x="1015" y="217" text-anchor="middle" class="callout-box" style="font-size:11px">PR #2 ✓ Merge</text>

  <rect x="210" y="368" width="220" height="20" rx="4" fill="#fff" stroke="#7B2D8E" stroke-width="1"/>
  <text x="320" y="382" text-anchor="middle" class="small" style="fill:#7B2D8E; font-size:10px">① Develops concurrently with feature/1</text>

  <rect x="790" y="368" width="200" height="20" rx="4" fill="#fff" stroke="#7B2D8E" stroke-width="1"/>
  <text x="890" y="382" text-anchor="middle" class="small" style="fill:#7B2D8E; font-size:10px">③ Resolves conflicts &amp; opens PR #2</text>

  <!-- Concurrent indicator -->
  <rect x="170" y="415" width="480" height="42" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="410" y="434" text-anchor="middle" class="label" style="font-size:11px; fill:#E65100; font-weight:bold;">⭐ Both feature branches are active simultaneously</text>
  <text x="410" y="450" text-anchor="middle" class="small" style="font-size:10px; fill:#E65100;">After PR #1 merges, feature/2 must incorporate main before its own PR</text>

  <!-- FABRIC SECTION -->
  <rect x="30" y="520" width="1140" height="270" rx="10" fill="#E8F5E9" stroke="#107C10" stroke-width="2"/>
  <rect x="30" y="520" width="1140" height="36" rx="10" fill="#107C10"/>
  <rect x="30" y="546" width="1140" height="10" fill="#107C10"/>
  <text x="600" y="544" text-anchor="middle" class="section-title">Microsoft Fabric Workspaces</text>

  <line x1="600" y1="498" x2="600" y2="516" stroke="#0078D4" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="665" y="512" class="label-bold" fill="#0078D4">Git Sync (main)</text>

  <!-- DEV -->
  <rect x="120" y="575" width="280" height="75" rx="8" fill="#fff" stroke="#0078D4" stroke-width="2"/>
  <rect x="120" y="575" width="280" height="28" rx="8" fill="#0078D4"/>
  <rect x="120" y="595" width="280" height="8" fill="#0078D4"/>
  <text x="260" y="595" text-anchor="middle" class="white-text" style="font-size:11px">DEV Workspace</text>
  <text x="260" y="620" text-anchor="middle" class="small">Connected to main branch</text>
  <text x="260" y="636" text-anchor="middle" class="small">Syncs after each PR merge</text>

  <!-- TEST -->
  <rect x="460" y="575" width="280" height="75" rx="8" fill="#fff" stroke="#ED8B00" stroke-width="2"/>
  <rect x="460" y="575" width="280" height="28" rx="8" fill="#ED8B00"/>
  <rect x="460" y="595" width="280" height="8" fill="#ED8B00"/>
  <text x="600" y="595" text-anchor="middle" class="white-text" style="font-size:11px">TEST Workspace</text>
  <text x="600" y="620" text-anchor="middle" class="small">QA &amp; Validation</text>
  <text x="600" y="636" text-anchor="middle" class="small">Promoted via Deployment Pipeline</text>

  <!-- PROD -->
  <rect x="800" y="575" width="280" height="75" rx="8" fill="#fff" stroke="#107C10" stroke-width="2"/>
  <rect x="800" y="575" width="280" height="28" rx="8" fill="#107C10"/>
  <rect x="800" y="595" width="280" height="8" fill="#107C10"/>
  <text x="940" y="595" text-anchor="middle" class="white-text" style="font-size:11px">PROD Workspace</text>
  <text x="940" y="620" text-anchor="middle" class="small">Production Environment</text>
  <text x="940" y="636" text-anchor="middle" class="small">Promoted via Deployment Pipeline</text>

  <line x1="405" y1="613" x2="455" y2="613" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="605" text-anchor="middle" class="small" style="font-size:9px">Deploy</text>
  <line x1="745" y1="613" x2="795" y2="613" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="770" y="605" text-anchor="middle" class="small" style="font-size:9px">Deploy</text>

  <rect x="320" y="670" width="560" height="30" rx="6" fill="#F5F5F5" stroke="#ccc" stroke-width="1"/>
  <text x="600" y="690" text-anchor="middle" class="label" style="font-size:12px; fill:#555;">Fabric Deployment Pipeline  (DEV → TEST → PROD)</text>

  <text x="600" y="740" text-anchor="middle" class="small" style="font-size:10px; fill:#888;">Concurrent feature branches develop in parallel → First to complete opens PR → After merge, remaining branches merge main → Then open their own PR</text>
  <text x="600" y="758" text-anchor="middle" class="small" style="font-size:10px; fill:#888;">DEV workspace syncs after each merge to main → Validated changes deploy through TEST → PROD</text>

  </g>
</svg>